    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/scripts/supabase-client.js"></script>
    <style>
        .upload-area { border: 2px dashed #e2e8f0; padding: 1.5rem; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fdfdfd; margin-top: 0.5rem; }
        .upload-area:hover { border-color: #020617; background: #f8fafc; }
        .preview-img { max-height: 60px; margin-top: 1rem; display: none; margin-left: auto; margin-right: auto; object-fit: contain; border: 1px solid #eee; padding: 5px; border-radius: 4px; background: #f8fafc; }

</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="admin-logo">
                <i data-lucide="layout-dashboard"></i>
                <span>DAUMIS ADMIN</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/index.html"><i data-lucide="home"></i> 대시보드 홈</a></li>
                <li class="nav-item"><a href="/admin/projects.html"><i data-lucide="briefcase"></i> 프로젝트 실적</a></li>
                <li class="nav-item active"><a href="/admin/partners.html"><i data-lucide="users"></i> 고객사 & 파트너</a></li>
                <li class="nav-item"><a href="/admin/history.html"><i data-lucide="history"></i> 연혁 관리</a></li>
                <li class="nav-item"><a href="/admin/careers.html"><i data-lucide="user-plus"></i> 채용 관리</a></li>
                <li class="nav-item"><a href="/admin/inquiries.html"><i data-lucide="message-square"></i> 문의 내역</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer" style="padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="external-link" style="width: 14px;"></i> 메인사이트 가기
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div class="page-title">
                <h1>고객사 & 파트너 관리</h1>
                <p>로고 및 파트너십 정보를 관리합니다.</p>
            </div>
            <div class="header-actions">
                <!-- 마이그레이션 버튼 삭제 -->
            </div>
        </header>

        <!-- Filter & Search Bar -->
        <section style="width: 100%; box-sizing: border-box; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; gap: 2rem;">
            <div class="category-chips" id="categoryChips" style="display: flex; gap: 0.6rem; flex-wrap: wrap; flex: 1;">
                <button class="chip active" data-value="all">전체 <span class="count" id="count-all">0</span></button>
                <button class="chip" data-value="client">고객사 (CLIENT) <span class="count" id="count-client">0</span></button>
                <button class="chip" data-value="partner">파트너사 (PARTNER) <span class="count" id="count-partner">0</span></button>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem; width: 340px; flex-shrink: 0; margin-right: 0;">
                <input type="text" id="searchInput" placeholder="업체명 검색" style="flex: 1; margin: 0; padding: 0.75rem 1rem; font-size: 1.05rem; border-radius: 8px; border: 1px solid var(--admin-border); outline: none; box-sizing: border-box;" onkeyup="if(event.key==='Enter') {currentPage=1; applyFilters()}">
                <button class="btn" style="margin: 0; background: #1e293b; color: #fff; box-sizing: border-box;" onclick="currentPage=1; applyFilters()">검색</button>
            </div>
        </section>

        <!-- Partner List Table -->
        <section class="data-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 100px; cursor: pointer; white-space: nowrap;" onclick="handleSort('no')">
                            <div style="display: flex; align-items: center; gap: 4px;">No <i data-lucide="chevrons-up-down" style="width: 14px;"></i></div>
                        </th>
                        <th style="width: 140px; text-align: center;">로고</th>
                        <th style="cursor: pointer; white-space: nowrap;" onclick="handleSort('name')">
                            <div style="display: flex; align-items: center; gap: 4px;">업체명 <i data-lucide="chevrons-up-down" style="width: 14px;"></i></div>
                        </th>
                        <th style="cursor: pointer; white-space: nowrap;" onclick="handleSort('type')">
                            <div style="display: flex; align-items: center; gap: 4px;">구분 <i data-lucide="chevrons-up-down" style="width: 14px;"></i></div>
                        </th>
                        <th style="cursor: pointer; white-space: nowrap;" onclick="handleSort('created_at')">
                            <div style="display: flex; align-items: center; gap: 4px;">등록일 <i data-lucide="chevrons-up-down" style="width: 14px;"></i></div>
                        </th>
                        <th style="text-align: center; width: 260px;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 데이터가 동적으로 삽입됩니다 -->
                </tbody>
            </table>
            
            <!-- Pagination & Add Button -->
            <div style="padding: 1.5rem 2rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-top: 1px solid var(--admin-border);">
                <div></div> <!-- Left balance -->
                <div id="pagination" style="display: flex; gap: 0.5rem; justify-content: center;">
                    <!-- 페이지 버튼이 동적으로 생성됩니다 -->
                </div>
                <div style="display: flex; justify-content: flex-end;">
                    <button class="btn btn-primary" id="addNewBtn" style="white-space: nowrap;">+ 신규 고객사 등록</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Partner Modal -->
    <div class="modal-overlay" id="partnerModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modalTitle">신규 고객사/파트너 등록</h2>
                <button class="modal-close" onclick="closeModal('partnerModal')"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <form id="partnerForm">
                    <div class="form-group">
                        <label class="form-label">구분</label>
                        <select id="editType" class="form-control">
                            <option value="client">고객사 (CLIENT)</option>
                            <option value="partner">파트너사 (PARTNER)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">업체명</label>
                        <input type="text" id="editName" class="form-control" placeholder="예: IBK기업은행" required>
                    </div>
                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label class="form-label">로고 이미지</label>
                        <input type="file" id="logoUpload" style="display: none;" accept="image/*">
                        <div class="upload-area" onclick="document.getElementById('logoUpload').click()" style="background: #fff; border-style: solid; border-width: 1px;">
                            <i data-lucide="upload-cloud" style="width: 24px; margin-bottom: 0.5rem; color: #64748b;"></i>
                            <div style="font-size: 0.85rem; color: #64748b;">클릭하여 로고 업로드 (가로형 PNG 권장)</div>
                        </div>
                        <img id="logoPreview" class="preview-img">
                        <input type="hidden" id="editLogoUrl">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('partnerModal')">취소</button>
                <button class="btn btn-primary" id="saveBtn">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        const partnerTableBody = document.querySelector('.data-table tbody');
        let allPartners = [];
        let filteredPartners = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 1. 데이터 불러오기
        async function fetchPartners() {
            const { data, error } = await supabaseClient
                .from('partners')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching partners:', error);
                projectTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">오류가 발생했습니다. (테이블 스키마 문제일 수 있습니다)</td></tr>';
                return;
            }

            // 정렬된 순서대로 번호 부여
            allPartners = data.map((p, idx) => ({
                ...p,
                displayNo: data.length - idx
            }));
            updateCounts();
            applyFilters();
        }

        // 카테고리 개수 업데이트
        function updateCounts() {
            const counts = {
                all: allPartners.length,
                client: allPartners.filter(p => p.type === 'client' || p.category === 'client').length,
                partner: allPartners.filter(p => p.type === 'partner' || p.category === 'partner').length
            };

            for (const [key, value] of Object.entries(counts)) {
                const el = document.getElementById(`count-${key}`);
                if (el) el.innerText = value;
            }
        }

        // 2. 필터 적용 및 테이블 렌더링
        let currentCategory = 'all';
        let sortColumn = 'no';
        let sortDirection = 'desc';
        let currentEditId = null;

        function handleSort(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            applyFilters();
        }

        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = function() {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.value;
                currentPage = 1;
                applyFilters();
            };
        });

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = currentCategory;

            filteredPartners = allPartners.filter(p => {
                const nameMatch = p.name ? p.name.toLowerCase().includes(searchTerm) : (p.company_name && p.company_name.toLowerCase().includes(searchTerm));
                const typeMatch = category === 'all' || p.type === category || p.category === category;
                return nameMatch && typeMatch;
            });

            filteredPartners.sort((a, b) => {
                let valA = a[sortColumn] || '';
                let valB = b[sortColumn] || '';
                
                if (sortColumn === 'no') {
                    valA = a.displayNo;
                    valB = b.displayNo;
                }

                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            renderTable();
            renderPagination();
        }

        function renderTable() {
            partnerTableBody.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pagedData = filteredPartners.slice(start, end);

            if (pagedData.length === 0) {
                partnerTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #94a3b8;">데이터가 없습니다.</td></tr>';
                return;
            }

            pagedData.forEach((partner) => {
                const tr = document.createElement('tr');
                const isClient = partner.type === 'client' || partner.category === 'client';
                const typeLabel = isClient ? '고객사' : '파트너사';
                const typeColor = isClient ? 'background: #dcfce7; color: #166534;' : 'background: #e0f2fe; color: #075985;';
                const partnerName = partner.name || partner.company_name || partner.client_name || '-';
                const createdAt = partner.created_at ? new Date(partner.created_at).toLocaleDateString() : '-';

                tr.innerHTML = `
                    <td style="color: #94a3b8;">${partner.displayNo}</td>
                    <td style="text-align: center;">
                        ${partner.logo_url ? `<img src="${partner.logo_url}" style="max-height: 35px; max-width: 100px; object-fit: contain;">` : '<div style="width: 80px; height: 35px; background: #f1f5f9; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; color: #94a3b8; margin: 0 auto;">LOGO</div>'}
                    </td>
                    <td style="font-weight: 600;">${partnerName}</td>
                    <td><span class="badge" style="${typeColor}">${typeLabel}</span></td>
                    <td>${createdAt}</td>
                    <td style="text-align: center; white-space: nowrap;">
                        <button class="btn btn-delete-action" onclick="deletePartner('${partner.id}')">
                            <i data-lucide="trash-2"></i> 삭제
                        </button>
                        <button class="btn btn-edit-action" onclick="openEditModal('${partner.id}')">
                            <i data-lucide="edit-2"></i> 수정
                        </button>
                    </td>
                `;
                partnerTableBody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function renderPagination() {
            const paginationEl = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredPartners.length / itemsPerPage);
            paginationEl.innerHTML = '';

            if (totalPages <= 1) return;

            const groupSize = 10;
            const currentGroup = Math.floor((currentPage - 1) / groupSize);
            const startPage = currentGroup * groupSize + 1;
            const endPage = Math.min(startPage + groupSize - 1, totalPages);

            if (currentGroup > 0) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn';
                prevBtn.style.background = '#fff';
                prevBtn.style.border = '1px solid var(--admin-border)';
                prevBtn.innerHTML = '<i data-lucide="chevron-left" style="width:16px"></i>';
                prevBtn.onclick = () => { currentPage = startPage - 1; applyFilters(); };
                paginationEl.appendChild(prevBtn);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `btn ${i === currentPage ? 'btn-primary' : ''}`;
                btn.style.background = i === currentPage ? '' : '#fff';
                btn.style.border = i === currentPage ? '' : '1px solid var(--admin-border)';
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderTable(); renderPagination(); };
                paginationEl.appendChild(btn);
            }

            if (endPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn';
                nextBtn.style.background = '#fff';
                nextBtn.style.border = '1px solid var(--admin-border)';
                nextBtn.innerHTML = '<i data-lucide="chevron-right" style="width:16px"></i>';
                nextBtn.onclick = () => { currentPage = endPage + 1; applyFilters(); };
                paginationEl.appendChild(nextBtn);
            }
            lucide.createIcons();
        }

        // 3. 데이터 저장하기
        async function savePartner() {
            const fileInput = document.getElementById('logoUpload');
            let logoUrl = document.getElementById('editLogoUrl').value;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                const filePath = `logos/${fileName}`;

                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('project-assets')
                    .upload(filePath, file);

                if (uploadError) {
                    alert('로고 업로드 오류: ' + uploadError.message);
                    return;
                }

                const { data: publicUrlData } = supabaseClient.storage.from('project-assets').getPublicUrl(filePath);
                logoUrl = publicUrlData.publicUrl;
            }

            const formData = {
                name: document.getElementById('editName').value,
                type: document.getElementById('editType').value,
                logo_url: logoUrl
            };

            if (!formData.name) { alert('업체명을 입력해주세요.'); return; }

            let result;
            if (currentEditId) {
                result = await supabaseClient.from('partners').update(formData).eq('id', currentEditId);
            } else {
                result = await supabaseClient.from('partners').insert([formData]);
            }

            if (result.error) {
                alert('저장 실패 (테이블 스키마를 확인하세요. name, type, logo_url): ' + result.error.message);
            } else {
                alert(currentEditId ? '수정되었습니다!' : '저장되었습니다!');
                closeModal('partnerModal');
                fetchPartners();
            }
        }

        async function openEditModal(id) {
            const { data, error } = await supabaseClient.from('partners').select('*').eq('id', id).single();
            if (error) { alert('데이터 로드 실패'); return; }

            currentEditId = id;
            document.getElementById('modalTitle').innerText = '고객사 정보 수정';
            
            document.getElementById('editName').value = data.name || data.company_name || '';
            document.getElementById('editType').value = data.type || data.category || 'client';
            document.getElementById('editLogoUrl').value = data.logo_url || '';
            
            const preview = document.getElementById('logoPreview');
            if (data.logo_url) {
                preview.src = data.logo_url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }

            openModal('partnerModal');
        }

        document.getElementById('logoUpload').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('logoPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        };

        async function deletePartner(id) {
            if (!confirm('정말로 삭제하시겠습니까?')) return;
            const { error } = await supabaseClient.from('partners').delete().eq('id', id);
            if (error) alert('삭제 오류: ' + error.message);
            else fetchPartners();
        }

        document.getElementById('addNewBtn').onclick = function() {
            currentEditId = null;
            document.getElementById('partnerForm').reset();
            document.getElementById('modalTitle').innerText = '신규 고객사 등록';
            document.getElementById('logoPreview').style.display = 'none';
            openModal('partnerModal');
        };

        document.getElementById('saveBtn').onclick = savePartner;

            ];

            let successCount = 0;
            for (const item of rawData) {
                const { error } = await supabaseClient.from('partners').insert([item]);
                if (error) {
                    console.error('Insert error:', error);
                } else {
                    successCount++;
                }
            }
            alert(`완료! 성공적으로 ${successCount}개의 고객사 데이터를 삽입했습니다.\n(실패한 데이터가 있다면 테이블 컬럼명을 확인해 주세요)`);
            fetchPartners();
        }

        window.addEventListener('DOMContentLoaded', fetchPartners);
        lucide.createIcons();
    </script>
</body>
</html>
