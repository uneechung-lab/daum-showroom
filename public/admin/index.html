<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAUMIS | Admin Dashboard</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/scripts/supabase-client.js?v=2"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="admin-logo">
                <i data-lucide="layout-dashboard"></i>
                <span>DAUMIS ADMIN</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-menu">
                <li class="nav-item active"><a href="/admin/index.html"><i data-lucide="home"></i> 대시보드 홈</a></li>
                <li class="nav-item"><a href="/admin/projects.html"><i data-lucide="briefcase"></i> 프로젝트 실적</a></li>
                <li class="nav-item"><a href="/admin/partners.html"><i data-lucide="users"></i> 고객사 & 파트너</a></li>
                <li class="nav-item"><a href="/admin/history.html"><i data-lucide="history"></i> 연혁 관리</a></li>
                <li class="nav-item"><a href="/admin/careers.html"><i data-lucide="user-plus"></i> 채용 관리</a></li>
                <li class="nav-item"><a href="/admin/inquiries.html"><i data-lucide="message-square"></i> 문의 내역</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer" style="padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="external-link" style="width: 14px;"></i> 메인사이트 가기
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div class="page-title">
                <h1>관리 대시보드</h1>
                <p>다음에이아이 쇼룸의 데이터를 통합 관리합니다.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary">로그아웃</button>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">새 문의 내역</span>
                <div class="stat-value">12건</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">신규 지원자</span>
                <div class="stat-value">5명</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">등록된 프로젝트</span>
                <div class="stat-value">148건</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">파트너십</span>
                <div class="stat-value">32개사</div>
            </div>
        </section>

        <!-- Recent Activity Table -->
        <section class="data-card">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--admin-border); display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-weight: 700;">최근 문의 접수 현황</h3>
                <a href="/admin/inquiries.html" style="font-size: 0.85rem; color: var(--admin-accent); font-weight: 600;">전체보기</a>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>작성자</th>
                        <th>회사명</th>
                        <th>제목</th>
                        <th>날짜</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>김철수</td>
                        <td>한국은행</td>
                        <td>퇴직연금 시스템 도입 문의</td>
                        <td>2024.05.15</td>
                        <td><span class="badge badge-pending">미확인</span></td>
                    </tr>
                    <tr>
                        <td>이영희</td>
                        <td>신한금융지주</td>
                        <td>차세대 자산관리 솔루션 제안 요청</td>
                        <td>2024.05.14</td>
                        <td><span class="badge badge-complete">확인완료</span></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
