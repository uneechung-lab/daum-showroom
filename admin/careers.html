<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용 관리 | DAUMIS Admin</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/admin/scripts/supabase-client.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="admin-logo">
                <i data-lucide="layout-dashboard"></i>
                <span>DAUMIS ADMIN</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/index.html"><i data-lucide="home"></i> 대시보드 홈</a></li>
                <li class="nav-item"><a href="/admin/projects.html"><i data-lucide="briefcase"></i> 프로젝트 실적</a></li>
                <li class="nav-item"><a href="/admin/partners.html"><i data-lucide="users"></i> 고객사 & 파트너</a></li>
                <li class="nav-item"><a href="/admin/history.html"><i data-lucide="history"></i> 연혁 관리</a></li>
                <li class="nav-item active"><a href="/admin/careers.html"><i data-lucide="user-plus"></i> 채용 관리</a></li>
                <li class="nav-item"><a href="/admin/inquiries.html"><i data-lucide="message-square"></i> 문의 내역</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer" style="padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="external-link" style="width: 14px;"></i> 메인사이트 가기
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div class="page-title">
                <h1>채용 관리</h1>
                <p>인재 영입을 위한 공고 등록 및 지원 현황을 관리합니다.</p>
            </div>
            <div class="header-actions" style="display: flex; gap: 0.5rem;">
                <button class="btn" style="background: #fff; border: 1px solid var(--admin-border);"><i data-lucide="download" style="width: 14px;"></i> 지원현황 엑셀 다운로드</button>
                <button class="btn btn-primary">+ 신규 공고 등록</button>
            </div>
        </header>

        <!-- Recruitment Stats -->
        <section class="stats-grid" style="margin-bottom: 2rem;">
            <div class="stat-card">
                <span class="stat-label">진행 중인 공고</span>
                <div class="stat-value" id="activePostingsCount">0건</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">이번 주 지원자</span>
                <div class="stat-value">12명</div>
            </div>
        </section>

        <!-- Tab Menu -->
        <div style="display: flex; gap: 2rem; border-bottom: 1px solid var(--admin-border); margin-bottom: 1.5rem;">
            <button style="padding: 1rem 0; border: none; background: none; border-bottom: 2px solid var(--admin-accent); font-weight: 700; cursor: pointer;">공고 목록</button>
            <button style="padding: 1rem 0; border: none; background: none; color: var(--admin-text-sub); font-weight: 500; cursor: pointer;">지원자 현황</button>
        </div>

        <!-- Job Posting List Table -->
        <section class="data-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="cursor: pointer; user-select: none;" onclick="sortBy('label')">
                            <div style="display: flex; align-items: center; gap: 4px;">구분 <i data-lucide="chevrons-up-down" style="width: 14px; color: #94a3b8;" class="sort-icon"></i></div>
                        </th>
                        <th style="cursor: pointer; user-select: none;" onclick="sortBy('title')">
                            <div style="display: flex; align-items: center; gap: 4px;">공고명 <i data-lucide="chevrons-up-down" style="width: 14px; color: #94a3b8;" class="sort-icon"></i></div>
                        </th>
                        <th style="cursor: pointer; user-select: none;" onclick="sortBy('job_type')">
                            <div style="display: flex; align-items: center; gap: 4px;">유형 <i data-lucide="chevrons-up-down" style="width: 14px; color: #94a3b8;" class="sort-icon"></i></div>
                        </th>
                        <th style="cursor: pointer; user-select: none;" onclick="sortBy('deadline')">
                            <div style="display: flex; align-items: center; gap: 4px;">마감일 <i data-lucide="chevrons-up-down" style="width: 14px; color: #94a3b8;" class="sort-icon"></i></div>
                        </th>
                        <th style="cursor: pointer; user-select: none;" onclick="sortBy('is_active')">
                            <div style="display: flex; align-items: center; gap: 4px;">상태 <i data-lucide="chevrons-up-down" style="width: 14px; color: #94a3b8;" class="sort-icon"></i></div>
                        </th>
                        <th style="text-align: right;">관리</th>
                    </tr>
                </thead>
                <tbody id="careerTableBody">
                    <!-- Dynamic rows load here -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Career Modal -->
    <div class="modal-overlay" id="careerModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modalTitle">신규 채용 공고 등록</h2>
                <button class="modal-close" onclick="closeModal('careerModal')"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <form id="careerForm">
                    <input type="hidden" id="careerId">
                    <div style="display: grid; grid-template-columns: 1fr 140px; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">공고 제목</label>
                            <input type="text" id="career_title" class="form-control" placeholder="예: 금융 시스템 아키텍트 경력직 채용" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">상태</label>
                            <select id="career_is_active" class="form-control">
                                <option value="true">진행중 (노출)</option>
                                <option value="false">마감 (숨김)</option>
                            </select>
                        </div>
                    </div>
                    <style>
                        .segment-group { display: flex; border: 1px solid var(--admin-border); border-radius: 10px; overflow: hidden; height: 54px; }
                        .segment-btn { flex: 1; text-align: center; cursor: pointer; border-right: 1px solid var(--admin-border); margin: 0; }
                        .segment-btn:last-child { border-right: none; }
                        .segment-btn input[type="radio"], .segment-btn input[type="checkbox"] { display: none; }
                        .segment-btn span { display: flex; align-items: center; justify-content: center; height: 100%; background-color: #f8fafc; color: #64748b; font-size: 1.05rem; font-weight: 600; transition: all 0.2s; }
                        .segment-btn input[type="radio"]:checked + span, .segment-btn input[type="checkbox"]:checked + span { background-color: #0f172a; color: white; }
                    </style>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">구분</label>
                            <div class="segment-group">
                                <label class="segment-btn"><input type="radio" name="career_label" value="Open Roles" onchange="toggleDynamicFields(this.value)" checked><span>상시채용</span></label>
                                <label class="segment-btn"><input type="radio" name="career_label" value="Talent Pool" onchange="toggleDynamicFields(this.value)"><span>인재풀</span></label>
                                <label class="segment-btn"><input type="radio" name="career_label" value="Immediate" onchange="toggleDynamicFields(this.value)"><span>즉시채용</span></label>
                                <label class="segment-btn"><input type="radio" name="career_label" value="Project" onchange="toggleDynamicFields(this.value)"><span>프로젝트</span></label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">고용 형태</label>
                            <div class="segment-group">
                                <label class="segment-btn"><input type="checkbox" name="job_type_cb" value="정규직"><span>정규직</span></label>
                                <label class="segment-btn"><input type="checkbox" name="job_type_cb" value="계약직"><span>계약직</span></label>
                                <label class="segment-btn"><input type="checkbox" name="job_type_cb" value="프리랜서"><span>프리랜서</span></label>
                                <label class="segment-btn"><input type="checkbox" name="job_type_cb" value="인턴"><span>인턴</span></label>
                            </div>
                        </div>
                    </div>
                    <div id="contract_period_group" style="display: none; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">계약 시작일 (프로젝트 전용)</label>
                            <input type="date" id="career_contract_start" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약 종료일 (프로젝트 전용)</label>
                            <input type="date" id="career_contract_end" class="form-control">
                        </div>
                    </div>
                    <div id="date_group" style="display: none; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">시작일</label>
                            <input type="date" id="career_start_date" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">마감일</label>
                            <input type="date" id="career_end_date" class="form-control">
                        </div>
                    </div>
                    <script>
                        function toggleDynamicFields(val) {
                            document.getElementById('contract_period_group').style.display = val === 'Project' ? 'grid' : 'none';
                            if (val === 'Immediate' || val === 'Project') {
                                document.getElementById('date_group').style.display = 'grid';
                            } else {
                                document.getElementById('date_group').style.display = 'none';
                                document.getElementById('career_start_date').value = '';
                                document.getElementById('career_end_date').value = '';
                            }
                            if (val !== 'Project') {
                                document.getElementById('career_contract_start').value = '';
                                document.getElementById('career_contract_end').value = '';
                            }
                        }
                    </script>
                    <div class="form-group">
                        <label class="form-label">한줄 소개 (Intro)</label>
                        <input type="text" id="career_intro" class="form-control" placeholder="예: 국내 주요 금융권의 차세대 시스템을 리드합니다." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">주요 업무 (줄바꿈으로 항목 구분)</label>
                        <textarea id="career_tasks" class="form-control" style="height: 80px;" placeholder="담당하게 될 업무를 한 줄에 하나씩 입력하세요" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">자격 요건 (줄바꿈으로 항목 구분)</label>
                        <textarea id="career_requirements" class="form-control" style="height: 80px;" placeholder="필수 자격 및 역량을 한 줄에 하나씩 입력하세요" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">우대 사항 (줄바꿈으로 항목 구분)</label>
                        <textarea id="career_preferred" class="form-control" style="height: 80px;" placeholder="우대하는 스택 및 경험을 한 줄에 하나씩 입력하세요"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('careerModal')">취소</button>
                <button class="btn btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        let allCareers = [];
        let currentEditMode = 'add'; // 'add' or 'edit'

        let currentSort = {
            column: 'id',
            direction: 'desc'
        };

        function sortBy(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }

            allCareers.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];

                if (column === 'deadline') {
                    valA = a.end_date || '상시채용';
                    valB = b.end_date || '상시채용';
                } else if (column === 'label') {
                    let cA = {};
                    let cB = {};
                    try { cA = typeof a.content === 'string' ? JSON.parse(a.content) : (a.content || {}); } catch(e) {}
                    try { cB = typeof b.content === 'string' ? JSON.parse(b.content) : (b.content || {}); } catch(e) {}
                    valA = cA.label || 'Open Roles';
                    valB = cB.label || 'Open Roles';
                }

                if (valA === null || valA === undefined) valA = '';
                if (valB === null || valB === undefined) valB = '';

                if (typeof valA === 'string') {
                    return currentSort.direction === 'asc' 
                        ? valA.localeCompare(valB) 
                        : valB.localeCompare(valA);
                } else {
                    return currentSort.direction === 'asc' 
                        ? (valA > valB ? 1 : -1) 
                        : (valA < valB ? 1 : -1);
                }
            });

            // Update UI indicators
            updateHeaderSortIndicators('careers', column, currentSort.direction);
            renderCareers();
        }

        function updateHeaderSortIndicators(page, column, direction) {
            const ths = document.querySelectorAll('.data-table thead th');
            ths.forEach(th => {
                const icon = th.querySelector('.sort-icon');
                if (icon) {
                    icon.setAttribute('data-lucide', 'chevrons-up-down');
                    icon.style.color = '#94a3b8';
                }
            });

            let clickedTh = null;
            if (page === 'careers') {
                const indexMap = {
                    'label': 0,
                    'title': 1,
                    'job_type': 2,
                    'deadline': 3,
                    'is_active': 4
                };
                clickedTh = ths[indexMap[column]];
            } else if (page === 'history') {
                const indexMap = {
                    'year': 0,
                    'month': 1,
                    'content': 2,
                    'is_major': 3
                };
                clickedTh = ths[indexMap[column]];
            }

            if (clickedTh) {
                const icon = clickedTh.querySelector('.sort-icon');
                if (icon) {
                    const iconName = direction === 'asc' ? 'chevron-up' : 'chevron-down';
                    icon.setAttribute('data-lucide', iconName);
                    icon.style.color = '#3b82f6';
                }
            }
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function openModal(id) { 
            document.getElementById(id).classList.add('active'); 
        }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
        }

        // Fetch Careers from Supabase
        async function fetchCareers() {
            try {
                const { data, error } = await supabaseClient
                    .from('job_postings')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    alert('공고 목록 조회 오류: ' + error.message);
                    return;
                }
                
                allCareers = data || [];
                renderCareers();
            } catch (err) {
                alert('데이터를 가져오는 중 오류가 발생했습니다: ' + err.message);
            }
        }

        // Render Table Body
        function renderCareers() {
            const tableBody = document.getElementById('careerTableBody');
            tableBody.innerHTML = '';
            
            if (allCareers.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 3rem; color: var(--admin-text-sub); font-weight: 500;">
                            등록된 채용 공고가 없습니다.
                        </td>
                    </tr>
                `;
                document.getElementById('activePostingsCount').innerText = '0건';
                return;
            }
            
            let activeCount = 0;
            
            allCareers.forEach((job) => {
                if (job.is_active) activeCount++;
                
                // Content JSON
                let contentObj = {};
                try {
                    contentObj = typeof job.content === 'string' ? JSON.parse(job.content) : (job.content || {});
                } catch (e) {
                    console.error("Content parsing error:", e);
                }
                
                const label = contentObj.label || 'Open Roles';

                let deadlineStr = '';
                if (label === 'Open Roles' || label === 'Talent Pool') {
                    deadlineStr = label === 'Open Roles' ? '상시채용' : '인재풀';
                } else {
                    const startStr = contentObj.startDate || '';
                    const endStr = job.end_date || '';
                    if (startStr && endStr) deadlineStr = `${startStr} ~ ${endStr}`;
                    else if (endStr) deadlineStr = `~ ${endStr}`;
                    else deadlineStr = (label === 'Immediate' ? '채용시 마감' : (contentObj.contractPeriod || '프로젝트 단위'));
                }
                
                const statusBadge = job.is_active 
                    ? '<span class="badge badge-complete">진행중</span>' 
                    : '<span class="badge" style="background: #e2e8f0; color: #64748b;">마감</span>';
                
                const tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.onclick = (e) => {
                    if (e.target.closest('button')) return;
                    editCareer(job.id);
                };
                tr.innerHTML = `
                    <td>${label === 'Open Roles' ? '상시 채용' : (label === 'Immediate' ? '즉시 채용' : (label === 'Project' ? '프로젝트 채용' : '인재풀'))}</td>
                    <td style="font-weight: 600; text-align: left;">${job.title}</td>
                    <td>${job.job_type}</td>
                    <td>${deadlineStr}</td>
                    <td>${statusBadge}</td>
                    <td style="text-align: right; white-space: nowrap;">
                        <button class="btn btn-delete-action" style="padding: 0.35rem 0.6rem; margin-right: 0.25rem;" onclick="event.stopPropagation(); deleteCareer(${job.id})">
                            <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i> 삭제
                        </button>
                        <button class="btn btn-edit-action" style="padding: 0.35rem 0.6rem;" onclick="event.stopPropagation(); editCareer(${job.id})">
                            <i data-lucide="edit-2" style="width: 14px; height: 14px;"></i> 수정
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
            
            document.getElementById('activePostingsCount').innerText = activeCount + '건';
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        // Open Modal for Add
        document.querySelector('.header-actions .btn-primary').onclick = function() {
            currentEditMode = 'add';
            document.getElementById('modalTitle').innerText = '신규 채용 공고 등록';
            document.getElementById('careerForm').reset();
            document.getElementById('careerId').value = '';
            openModal('careerModal');
        };

        // Open Modal for Edit
        window.editCareer = function(id) {
            currentEditMode = 'edit';
            document.getElementById('modalTitle').innerText = '채용 공고 수정';
            
            const job = allCareers.find(c => c.id === id);
            if (!job) return;
            
            document.getElementById('careerId').value = job.id;
            document.getElementById('career_title').value = job.title || '';
            
            const jobTypeStr = job.job_type || '';
            document.querySelectorAll('input[name="job_type_cb"]').forEach(cb => {
                cb.checked = jobTypeStr.includes(cb.value);
            });
            document.getElementById('career_end_date').value = job.end_date || '';
            document.getElementById('career_is_active').value = String(job.is_active);
            
            let contentObj = {};
            try {
                contentObj = typeof job.content === 'string' ? JSON.parse(job.content) : (job.content || {});
            } catch (e) {
                console.error("Content parsing error:", e);
            }
            
            const labelVal = contentObj.label || 'Open Roles';
            const labelRadio = document.querySelector(`input[name="career_label"][value="${labelVal}"]`);
            if (labelRadio) labelRadio.checked = true;
            document.getElementById('career_intro').value = contentObj.intro || '';
            document.getElementById('career_contract_start').value = contentObj.contractStart || '';
            document.getElementById('career_contract_end').value = contentObj.contractEnd || '';
            document.getElementById('career_start_date').value = contentObj.startDate || '';
            toggleDynamicFields(contentObj.label || 'Open Roles');
            
            const tasks = contentObj.tasks || [];
            const reqs = contentObj.requirements || [];
            const pref = contentObj.preferred || [];
            
            document.getElementById('career_tasks').value = tasks.join('\n');
            document.getElementById('career_requirements').value = reqs.join('\n');
            document.getElementById('career_preferred').value = pref.join('\n');
            
            openModal('careerModal');
        };

        // Save (Insert / Update) Career
        async function saveCareer(event) {
            event.preventDefault();
            const btn = document.querySelector('#careerModal .modal-footer .btn-primary');
            btn.disabled = true;
            btn.innerText = '저장 중...';
            
            const id = document.getElementById('careerId').value;
            const title = document.getElementById('career_title').value;
            const department = '개발본부';
            const jobTypeCbs = document.querySelectorAll('input[name="job_type_cb"]:checked');
            const job_type = Array.from(jobTypeCbs).map(cb => cb.value).join('/') || '정규직';
            const end_date = document.getElementById('career_end_date').value || null;
            const is_active = document.getElementById('career_is_active').value === 'true';
            
            const labelRadio = document.querySelector('input[name="career_label"]:checked');
            const label = labelRadio ? labelRadio.value : 'Open Roles';
            const intro = document.getElementById('career_intro').value;
            const contractStart = document.getElementById('career_contract_start').value;
            const contractEnd = document.getElementById('career_contract_end').value;
            const startDate = document.getElementById('career_start_date').value || null;
            
            let contractPeriod = '';
            if (contractStart && contractEnd) contractPeriod = `${contractStart} ~ ${contractEnd}`;
            else if (contractStart) contractPeriod = `${contractStart} 부터`;
            else if (contractEnd) contractPeriod = `~ ${contractEnd} 까지`;
            
            const tasks = document.getElementById('career_tasks').value.split('\n').map(x => x.trim()).filter(Boolean);
            const requirements = document.getElementById('career_requirements').value.split('\n').map(x => x.trim()).filter(Boolean);
            const preferred = document.getElementById('career_preferred').value.split('\n').map(x => x.trim()).filter(Boolean);
            
            let metaText = "인재풀";
            if (label === 'Open Roles') metaText = "상시채용";
            else if (label === 'Immediate') {
                if (startDate && end_date) metaText = `${startDate} ~ ${end_date}`;
                else if (end_date) metaText = `~ ${end_date}`;
                else metaText = "채용시 마감";
            } else if (label === 'Project') {
                metaText = contractPeriod || "프로젝트 단위";
            }

            const content = JSON.stringify({
                label,
                meta: [job_type, metaText],
                intro,
                contractPeriod,
                contractStart,
                contractEnd,
                startDate,
                tasks,
                requirements,
                preferred
            });
            
            const payload = {
                title,
                department,
                job_type,
                end_date,
                is_active,
                content
            };
            
            try {
                if (currentEditMode === 'add') {
                    const { error } = await supabaseClient
                        .from('job_postings')
                        .insert([payload]);
                    
                    if (error) {
                        alert('등록 실패: ' + error.message);
                    } else {
                        closeModal('careerModal');
                        await fetchCareers();
                    }
                } else {
                    const { error } = await supabaseClient
                        .from('job_postings')
                        .update(payload)
                        .eq('id', id);
                    
                    if (error) {
                        alert('수정 실패: ' + error.message);
                    } else {
                        closeModal('careerModal');
                        await fetchCareers();
                    }
                }
            } catch (err) {
                alert('저장 중 오류 발생: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = '저장하기';
            }
        }

        // Delete Career
        window.deleteCareer = async function(id) {
            if (!confirm('정말로 이 채용 공고를 삭제하시겠습니까?')) {
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('job_postings')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    alert('삭제 실패: ' + error.message);
                } else {
                    await fetchCareers();
                }
            } catch (err) {
                alert('삭제 중 오류 발생: ' + err.message);
            }
        };

        // Wire form submit
        document.getElementById('careerForm').onsubmit = saveCareer;
        document.querySelector('#careerModal .modal-footer .btn-primary').onclick = function() {
            // trigger form submit
            document.getElementById('careerForm').requestSubmit();
        };

        // Initialize
        fetchCareers();
    </script>
</body>
</html>
