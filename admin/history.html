<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연혁 관리 | DAUMIS Admin</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="admin-logo">
                <i data-lucide="layout-dashboard"></i>
                <span>DAUMIS ADMIN</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-menu">
                <li class="nav-item"><a href="/admin/index.html"><i data-lucide="home"></i> 대시보드 홈</a></li>
                <li class="nav-item"><a href="/admin/projects.html"><i data-lucide="briefcase"></i> 프로젝트 실적</a></li>
                <li class="nav-item"><a href="/admin/partners.html"><i data-lucide="users"></i> 고객사 & 파트너</a></li>
                <li class="nav-item active"><a href="/admin/history.html"><i data-lucide="history"></i> 연혁 관리</a></li>
                <li class="nav-item"><a href="/admin/careers.html"><i data-lucide="user-plus"></i> 채용 관리</a></li>
                <li class="nav-item"><a href="/admin/inquiries.html"><i data-lucide="message-square"></i> 문의 내역</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer" style="padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="/" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="external-link" style="width: 14px;"></i> 메인사이트 가기
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <div class="page-title">
                <h1>기업 연혁 관리</h1>
                <p>회사의 주요 발자취를 시간순으로 관리합니다.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary">+ 신규 연혁 등록</button>
            </div>
        </header>

        <!-- History List Table -->
        <section class="data-card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 100px;">년도</th>
                        <th style="width: 80px;">월</th>
                        <th>내용</th>
                        <th style="width: 100px;">중요도</th>
                        <th style="text-align: right;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight: 700; font-family: 'Outfit';">2024</td>
                        <td>01</td>
                        <td>IBK기업은행 POST 차세대 대응개발 (집합투자증권/퇴직연금)</td>
                        <td><span class="badge badge-complete">주요</span></td>
                        <td style="text-align: right;">
                            <button class="btn" style="padding: 0.3rem 0.6rem; background: #f1f5f9;"><i data-lucide="edit-2" style="width: 14px;"></i></button>
                            <button class="btn" style="padding: 0.3rem 0.6rem; background: #fee2e2; color: #ef4444;"><i data-lucide="trash-2" style="width: 14px;"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td style="font-weight: 700; font-family: 'Outfit';">2023</td>
                        <td>05</td>
                        <td>다음에이아이 쇼룸 오픈 및 자산관리 플랫폼 고도화</td>
                        <td><span class="badge" style="background: #f1f5f9; color: #64748b;">일반</span></td>
                        <td style="text-align: right;">
                            <button class="btn" style="padding: 0.3rem 0.6rem; background: #f1f5f9;"><i data-lucide="edit-2" style="width: 14px;"></i></button>
                            <button class="btn" style="padding: 0.3rem 0.6rem; background: #fee2e2; color: #ef4444;"><i data-lucide="trash-2" style="width: 14px;"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- History Modal -->
    <div class="modal-overlay" id="historyModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modalTitle">신규 연혁 등록</h2>
                <button class="modal-close" onclick="closeModal('historyModal')"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <form id="historyForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">연도 (Year)</label>
                            <input type="text" class="form-control" placeholder="예: 2024" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">월 (Month)</label>
                            <input type="text" class="form-control" placeholder="예: 05 (또는 현재)" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">연혁 내용</label>
                        <textarea class="form-control" placeholder="해당 시점의 주요 성과를 입력하세요"></textarea>
                    </div>
                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" style="width: 18px; height: 18px;">
                            <span class="form-label" style="margin: 0;">주요 연혁으로 강조 (타임라인 노란색 강조)</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('historyModal')">취소</button>
                <button class="btn btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        document.querySelector('.header-actions .btn-primary').onclick = function() {
            openModal('historyModal');
        };

        lucide.createIcons();
    </script>
</body>
</html>
